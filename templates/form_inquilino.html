{% extends "base.html" %}

{% block titulo %}{{ "Editar" if inquilino else "Nuevo" }} Inquilino{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="form-card">
            <h4 class="fw-bold mb-4 text-dark">
                <i class="bi bi-person"></i>
                {{ "Editar Inquilino" if inquilino else "Nuevo Inquilino" }}
            </h4>

            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" name="nombre" class="form-control"
                           value="{{ inquilino.nombre if inquilino else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Carnet</label>
                    <input type="text" name="dni" class="form-control"
                           value="{{ inquilino.dni if inquilino else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" name="correo" class="form-control"
                           value="{{ inquilino.correo if inquilino else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control"
                           value="{{ inquilino.telefono if inquilino else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contacto de emergencia</label>
                    <input type="text" name="contacto_emergencia" class="form-control"
                           value="{{ inquilino.contacto_emergencia if inquilino else '' }}">
                </div>
                <div class="mb-4">
                    <label class="form-label">Teléfono de emergencia</label>
                    <input type="text" name="telefono_emergencia" class="form-control"
                           value="{{ inquilino.telefono_emergencia if inquilino else '' }}">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primario">
                        <i class="bi bi-save"></i> Guardar
                    </button>
                    <a href="/vistas/inquilinos" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
